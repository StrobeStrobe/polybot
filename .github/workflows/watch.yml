name: polybot-watch

# Runs a single poll on a timer. GitHub's scheduler is best-effort and may
# delay or coalesce runs under load, so real cadence is ~5-15 min. Fine here:
# copy/track alerts use a 90-minute freshness window.
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (best effort)
  workflow_dispatch: {}      # lets you trigger a run manually from the Actions tab

# Avoid overlapping runs and let the latest win.
concurrency:
  group: polybot-watch
  cancel-in-progress: false

permissions:
  contents: write            # needed to commit updated state back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Poll for new trades and alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ENABLED: "true"
        run: python run.py once

      - name: Persist state (last-seen markers, watchlist)
        run: |
          git config user.name "polybot-bot"
          git config user.email "polybot@users.noreply.github.com"
          git add state/*.json
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "state: poll update [skip ci]"
            git pull --rebase --autostash || true   # absorb any concurrent state push
            git push
          fi
